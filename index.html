<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ SATORI EP</title>
  <meta name="theme-color" content="#0b0d12" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
</head>
<body>
  <div class="bg-wrap">
    <img src="./jacket.png" alt="" class="bg-cover" />
    <div class="bg-overlay"></div>
  </div>

  <canvas id="starCanvas" aria-hidden="true"></canvas>
  <div id="shootingStars" class="shooting-stars" aria-hidden="true"></div>
  <div class="ocean" aria-hidden="true">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <main class="page">
    <section class="album-shell">
      <section class="hero-cover glass">
        <div class="hero-cover-inner">
          <img id="cover" class="hero-cover-image" src="./jacket.png" alt="DJ SATORI EP jacket" />
        </div>
      </section>

      <section class="meta-panel glass">
        <div class="eyebrow">EP</div>
        <h1>DJ SATORI EP</h1>
        <p class="subline">Available for 24 Hours ・ Then It Fades</p>

        <div class="action-row">
          <button id="playBtn" class="btn btn-primary">▶ 再生</button>
          <button id="pauseBtn" class="btn">⏸ 一時停止</button>
          <button id="prevBtn" class="icon-btn" aria-label="前の曲">⏮</button>
          <button id="nextBtn" class="icon-btn" aria-label="次の曲">⏭</button>
        </div>

        <div class="now-row">
          <div>
            <div class="label">Now Playing</div>
            <div id="nowPlaying" class="now-playing">1. サンパチ</div>
          </div>

          <div class="visit-wrap">
            <div class="label">Visits</div>
            <div id="visitCounter" class="visit-counter">0</div>
          </div>
        </div>

        <div class="seek-card">
          <div id="waveform"></div>

          <div class="time-row">
            <span id="currentTime">00:00</span>
            <input
              id="seekBar"
              class="seek-bar"
              type="range"
              min="0"
              max="1000"
              value="0"
              aria-label="再生位置"
            />
            <span id="duration">00:00</span>
          </div>
        </div>

        <div class="countdown-card">
          <div class="label">削除まで</div>
          <div id="countdown" class="countdown">--:--:--</div>
        </div>
      </section>

      <section class="tracklist-panel glass">
        <div class="panel-head">
          <h2>Tracks</h2>
          <span>Full jacket view</span>
        </div>
        <div id="tracklist" class="tracklist"></div>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
